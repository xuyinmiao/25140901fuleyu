<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntraPanel — {% block title %}{% endblock %}</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
    nav { background: #1a1a2e; color: #fff; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #e0e0e0; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: bold; font-size: 1.1rem; color: #fff; margin-right: auto; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 6px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 1rem; }
    .btn { padding: 0.4rem 1rem; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #2d2d4e; }
    input[type=text], input[type=password], input[type=email] { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    .error { color: #c0392b; margin-top: 0.5rem; }
    .flash { background: #d4edda; color: #155724; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    pre { background: #1a1a2e; color: #eee; padding: 1rem; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
{% if session.get('user_id') %}
<nav>
  <span class="brand">IntraPanel</span>
  <a href="/">Dashboard</a>
  <a href="/users">Users</a>
  <a href="/files">Files</a>
  <a href="/diag">Diagnostics</a>
  <a href="/logout">Logout ({{ session.get('username') }})</a>
</nav>
{% endif %}
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
